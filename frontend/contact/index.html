<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ランチマップ — お問い合わせ">
  <title>お問い合わせ — ランチマップ</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../design-system/style.css">
  <link rel="stylesheet" href="./style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <button class="btn btn-ghost btn-sm" id="back-btn">← 戻る</button>
      <span class="header-title">お問い合わせ</span>
      <div class="header-spacer"></div>
    </div>
  </header>

  <div class="contact-content">
    <div class="main">

      <form id="contact-form" novalidate>

        <div class="contact-intro">
          <p>ランチマップをご利用いただきありがとうございます。</p>
          <p>ご感想・ご要望・バグ報告など、お気軽にお寄せください。</p>
          <p class="text-muted" style="font-size:13px; margin-top:var(--space-2);">※個別の返信は行っていませんが、すべて大切に拝見しております。</p>
        </div>

        <!-- 削除依頼の補足 -->
        <div id="deletion-note" style="display:none">
          <div class="alert alert-warning">
            <strong>削除依頼について</strong><br>
            対象の投稿 URL または投稿 ID を「内容」欄に記載してください。確認後、対応いたします。
          </div>
        </div>

        <!-- 内容 -->
        <div class="form-group">
          <label class="form-label" for="body">内容 <span class="required">*</span></label>
          <textarea class="form-input form-textarea" id="body" rows="6" maxlength="1000"
            placeholder="お気づきの点をお聞かせください…"></textarea>
          <div class="form-footer-row">
            <div class="form-error" id="body-error" style="display:none">⚠ 内容を入力してください</div>
            <span class="char-count"><span id="char-count">0</span> / 1000</span>
          </div>
        </div>

        <!-- API エラー -->
        <div class="form-error" id="api-error" style="display:none; margin-bottom:var(--space-4);"></div>

        <button type="submit" class="btn btn-primary btn-full btn-lg" id="submit-btn">
          送信する
        </button>

      </form>

    </div>
  </div>

  <script src="../jquery-4.0.0.min.js"></script>
  <script src="../common.js"></script>
  <script src="./script.js"></script>
</body>
</html>
